{% extends "base.html" %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h3 class="mb-0">Classificação Geral</h3>
    </div>
    <div class="card-body">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>Posição</th>
                    <th>Participante</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr {% if user == current_user %}class="table-warning"{% endif %}>
                    <td><strong>{{ loop.index }}º</strong></td>
                    <td>{{ user.username.capitalize() }}</td>
                    <td><span class="badge bg-success fs-6">{{ user.points_total }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
