{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Próximos Jogos</h2>
<div class="row">
    {% for game in games %}
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white text-center border-0 pt-3">
                <span class="badge bg-secondary">Rodada {{ game.round_no }}</span>
                <p class="text-muted mb-0 mt-1" style="font-size: 0.8rem;">
                    📅 {{ game.date }} | 🕒 {{ game.time }}
                </p>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center text-center">
                    <div style="flex: 1;"><strong>{{ game.team_a }}</strong></div>
                    <div class="d-flex align-items-center mx-2">
                        <input type="number" class="form-control text-center mx-1" style="width: 50px;" placeholder="0">
                        <span class="fw-bold">x</span>
                        <input type="number" class="form-control text-center mx-1" style="width: 50px;" placeholder="0">
                    </div>
                    <div style="flex: 1;"><strong>{{ game.team_b }}</strong></div>
                </div>
                <button class="btn btn-primary w-100 mt-3">Salvar Palpite</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
