<form method="POST">
    <div class="row mb-2">
        <div class="col">
            <label class="form-label">Time A</label>
            <input type="text" name="team_a" class="form-control" placeholder="Brasil" required>
        </div>
        <div class="col">
            <label class="form-label">Sigla Bandeira A</label>
            <input type="text" name="flag_a" class="form-control" placeholder="br" required>
        </div>
    </div>

    <div class="row mb-2">
        <div class="col">
            <label class="form-label">Time B</label>
            <input type="text" name="team_b" class="form-control" placeholder="Argentina" required>
        </div>
        <div class="col">
            <label class="form-label">Sigla Bandeira B</label>
            <input type="text" name="flag_b" class="form-control" placeholder="ar" required>
        </div>
    </div>

    <div class="row mb-2">
        <div class="col">
            <label class="form-label">Data</label>
            <input type="date" name="date" class="form-control" required>
        </div>
        <div class="col">
            <label class="form-label">Horário</label>
            <input type="time" name="time" class="form-control" required>
        </div>
    </div>
    
    <div class="mb-3 mt-2">
        <label class="form-label">Rodada</label>
        <input type="number" name="round_no" class="form-control" value="1" required>
    </div>
    
    <button type="submit" class="btn btn-success w-100">Salvar Jogo</button>
</form>
